<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Permite que `*-h-full` (100%) se mida contra la altura real del viewport */
        html, body { height: 100%; }
    </style>
    <title>Control de Gastos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            content: ['./*.{html,js}']
        }
    </script>
    <!-- Script para cargar el modo oscuro desde localStorage antes de pintar la web (evita parpadeos) -->
    <script>
        if (
            localStorage.theme === 'dark' ||
            (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)
        ) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="font-sans bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-white min-h-full transition-colors duration-500">
    
    <!-- Versión -->
    <div id="version-tag" class="fixed top-2 left-2 text-xs text-gray-400 dark:text-gray-600 font-mono pointer-events-none">
        v-?
    </div>
    
    <!-- Menú lateral: en movil se muestra como bloque normal; en desktop, como sidebar fijo -->
    <aside class="bg-white dark:bg-gray-800 p-6 w-full md:w-1/4 md:fixed md:right-0 md:top-0 md:h-full md:overflow-y-auto border-t md:border-t-0 md:border-l border-gray-200 dark:border-gray-700 transition-colors duration-500 shadow-sm md:shadow-none flex flex-col">
        <form id="expense-form" class="flex flex-col gap-3">
            <input type="text" id="expense-input" placeholder="Nombre del gasto (ej. Cine)" minlength="2" maxlength="60" required class="p-2.5 border border-gray-300 rounded-lg dark:bg-gray-700 dark:border-gray-600 dark:text-white focus-visible:ring-2 focus-visible:ring-blue-500 focus-visible:border-blue-500 focus-visible:outline-none transition-colors duration-500">
            
            <input type="number" id="expense-amount" placeholder="Importe (€)" step="0.01" min="0.01" max="1000000" required class="p-2.5 border border-gray-300 rounded-lg dark:bg-gray-700 dark:border-gray-600 dark:text-white focus-visible:ring-2 focus-visible:ring-blue-500 focus-visible:border-blue-500 focus-visible:outline-none transition-colors duration-500">
            
            <select id="expense-category" required class="p-2.5 border border-gray-300 rounded-lg dark:bg-gray-700 dark:border-gray-600 dark:text-white focus-visible:ring-2 focus-visible:ring-blue-500 focus-visible:border-blue-500 focus-visible:outline-none transition-colors duration-500">
                <option value="Ocio">Ocio</option>
                <option value="Supermercado">Supermercado</option>
                <option value="Hogar">Hogar</option>
                <option value="Transporte">Transporte</option>
            </select>

            <p id="form-error" class="hidden text-sm font-medium text-red-600 dark:text-red-400" role="alert" aria-live="polite"></p>
            
            <button type="submit" class="p-2.5 mt-2 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700 focus-visible:ring-4 focus-visible:ring-blue-500/50 focus-visible:outline-none transition-all shadow-md hover:shadow-lg">Añadir Gasto</button>
        </form>
        
        <div id="search-container" class="mt-8 pt-6 border-t border-gray-200 dark:border-gray-700 transition-colors duration-500">
            <input type="text" id="search-input" placeholder="Buscar por nombre o categoría..." class="w-full p-2.5 border border-gray-300 rounded-lg dark:bg-gray-700 dark:border-gray-600 dark:text-white focus-visible:ring-2 focus-visible:ring-blue-500 focus-visible:border-blue-500 focus-visible:outline-none transition-colors duration-500">
        </div>
        
        <button id="theme-toggle" class="mt-4 p-2.5 bg-gray-200 text-gray-800 dark:bg-gray-700 dark:text-white rounded-lg font-semibold hover:bg-gray-300 dark:hover:bg-gray-600 focus-visible:ring-4 focus-visible:ring-gray-500/50 focus-visible:outline-none transition-all w-full shadow-sm">Alternar Modo Oscuro</button>

        <button id="reset-expenses-button" type="button" class="mt-4 md:mt-auto p-2.5 bg-red-100 text-red-700 dark:bg-red-950/30 dark:text-red-300 rounded-lg font-semibold hover:bg-red-200 dark:hover:bg-red-900/50 focus-visible:ring-4 focus-visible:ring-red-500/40 focus-visible:outline-none transition-all w-full shadow-sm">Resetear todos los gastos</button>
    </aside>

    <div class="flex flex-col md:pr-1/4 min-h-full">
        
        <!-- Header con título -->
        <header class="bg-white text-gray-900 dark:bg-gray-800 dark:text-white p-8 text-center w-full transition-colors duration-500 shadow-sm">
            <h1 class="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-400 tracking-tight drop-shadow-sm pb-1">
                Control de Gastos
            </h1>
            <p class="text-gray-500 dark:text-gray-400 mt-2 text-sm md:text-base font-medium">Gestiona tu pasta de forma inteligente</p>
        </header>
        
        <main class="flex-1 p-6 flex justify-center items-start">
            <div class="w-full max-w-3xl mt-4">
                <section id="visible-summary" class="mb-4 grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <div class="bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700 rounded-xl p-4 shadow-sm transition-colors duration-500">
                        <p class="text-xs uppercase tracking-wide text-gray-500 dark:text-gray-400">Gastos visibles</p>
                        <p id="visible-count" class="mt-1 text-2xl font-extrabold text-gray-900 dark:text-gray-100">0</p>
                    </div>
                    <div class="bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700 rounded-xl p-4 shadow-sm transition-colors duration-500">
                        <p class="text-xs uppercase tracking-wide text-gray-500 dark:text-gray-400">Total visible</p>
                        <p id="visible-total" class="mt-1 text-2xl font-extrabold text-blue-700 dark:text-blue-300">0,00 €</p>
                    </div>
                </section>

                <div id="network-loading" class="hidden mt-4 bg-blue-50 border border-blue-200 text-blue-800 dark:bg-blue-950/30 dark:border-blue-900/60 dark:text-blue-200 p-3 rounded-lg text-sm flex items-center gap-3" role="status" aria-live="polite">
                    <span class="inline-block h-3 w-3 animate-spin rounded-full border-2 border-blue-500 border-t-transparent"></span>
                    Cargando tareas...
                </div>
                <div id="network-error" class="hidden mt-4 bg-red-50 border border-red-200 text-red-800 dark:bg-red-950/30 dark:border-red-900/60 dark:text-red-200 p-3 rounded-lg text-sm" role="alert" aria-live="polite"></div>

                <section id="expense-list" class="flex flex-col gap-4">
                    <!-- Los gastos se añadirán aquí dinámicamente -->
                </section>
            </div>
        </main>
        
    </div>

    <script src="version.js"></script>
    <script>
        const el = document.getElementById('version-tag');
        if (el && window.TASKFLOW_VERSION) {
            el.textContent = window.TASKFLOW_VERSION;
        }
    </script>
    <script src="src/api/client.js"></script>
    <script src="app.js"></script>
</body>
</html>
